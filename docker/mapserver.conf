# MapServer 8 global configuration.
# Used by BOTH the validation binary (spawned by the API) and the CGI preview
# endpoint (Apache). Only mapfiles located under the workspace are allowed.
CONFIG
  ENV
    # Allow only "*.map" under the container workspace (mounted from ./workspace).
    MS_MAP_PATTERN "^/data/maps/.*\.map$"
    # Allow a path in the "map=" CGI parameter (constrained by the pattern above).
    MS_MAP_NO_PATH "0"
  END
  MAPS
    # alias -> mapfile path. MapServer 8 no longer accepts a full path in the
    # CGI "map=" parameter, so previews must go through an alias defined here.
    # The bundled example is pre-seeded so it renders out of the box; more
    # entries are appended automatically on Open / Save As (USE_MAP_ALIAS=1).
    example "/data/maps/example.map"
  END
END
