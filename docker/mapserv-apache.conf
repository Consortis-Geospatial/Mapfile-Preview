# Mapfile Preview — Apache config for the internal MapServer CGI endpoint.
#
# This endpoint (http://127.0.0.1/cgi-bin/mapserv) is used ONLY by the Node API
# (server-side) to render WMS/WFS previews. It is not published outside the
# container. The ScriptAlias for /cgi-bin/ is provided by Debian's default
# serve-cgi-bin.conf; here we only point MapServer to its config file.
ServerName localhost

<Directory "/usr/lib/cgi-bin">
    SetEnv MAPSERVER_CONFIG_FILE /etc/mapserver/mapserver.conf
</Directory>
